version: "3.8"

services:
  server:
    image: tsightler/ring-mqtt:latest
    restart: on-failure
    network_mode: host
    stop_grace_period: 30s
    environment:
      # Broker Mosquitto de Umbrel (anónimo). NO es secreto: IP LAN del host.
      # Solo se lee en el PRIMER arranque para generar /data/config.json.
      MQTTHOST: "192.168.7.79"
      MQTTPORT: "1883"
      # DEBUG: "ring-mqtt"   # descomenta para logs detallados
    volumes:
      - ${APP_DATA_DIR}/data:/data
